name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint api/
        run: ruff check api/

      - name: Format check api/
        run: ruff format --check api/

      - name: Type check api/
        run: |
          pip install mypy types-PyYAML
          mypy api/ --ignore-missing-imports

      - name: Tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security audit api/
        run: |
          pip install pip-audit
          pip-audit -r api/requirements.txt

  plugin-sync:
    name: Plugin Reference Docs Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check reference docs are in sync
        run: |
          diff -r api/prompts/references/ plugin/pitchparse-cli/.claude/references/ \
            && echo "Reference docs are in sync" \
            || (echo "ERROR: Reference docs have diverged. Update plugin/pitchparse-cli/.claude/references/ to match api/prompts/references/." && exit 1)

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

      - name: Format check
        run: cd web && npm run format:check

      - name: Type check
        run: cd web && npx tsc --noEmit

      - name: Build
        run: cd web && npm run build

      - name: Tests
        run: cd web && npm test

      - name: Security audit
        run: cd web && npm audit --audit-level=high
